{{- if .Values.pusher.langfuse.createCredentialsSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.pusher.langfuse.credentialsSecret }}
  labels:
    {{- include "trace-pipeline.labels" . | nindent 4 }}
type: Opaque
stringData:
  public-key: {{ required "pusher.langfuse.publicKey is required when createCredentialsSecret is true" .Values.pusher.langfuse.publicKey | quote }}
  secret-key: {{ required "pusher.langfuse.secretKey is required when createCredentialsSecret is true" .Values.pusher.langfuse.secretKey | quote }}
{{- end }}
