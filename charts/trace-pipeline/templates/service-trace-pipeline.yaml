apiVersion: v1
kind: Service
metadata:
  name: {{ include "trace-pipeline.fullname" . }}
  labels:
    {{- include "trace-pipeline.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "trace-pipeline.selectorLabels" . | nindent 4 }}
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
