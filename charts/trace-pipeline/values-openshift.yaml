# Example values for OpenShift install.
# Copy and customize before: helm install trace-pipeline . -f values-openshift.example.yaml
#
# Generate Langfuse secrets:
#   export LANGFUSE_SALT=$(openssl rand -base64 32)
#   export LANGFUSE_ENCRYPTION_KEY=$(openssl rand -hex 32)
#   export LANGFUSE_NEXTAUTH_SECRET=$(openssl rand -base64 32)
#   export POSTGRES_PASSWORD=$(openssl rand -hex 24)
#   export REDIS_PASSWORD=$(openssl rand -hex 24)

langfuseRoute:
  enabled: true
  # host: langfuse.apps.example.com
  # publicUrl: https://langfuse.apps.example.com

pusher:
  langfuse:
    publicKey: "pk-lf-replace-me"
    secretKey: "sk-lf-replace-me"

langfuse:
  enabled: true
  langfuse:
    nextauth:
      url: "https://langfuse.apps.example.com"
      secret:
        value: ""  # set LANGFUSE_NEXTAUTH_SECRET
    salt:
      value: ""  # set LANGFUSE_SALT
    encryptionKey:
      value: ""  # set LANGFUSE_ENCRYPTION_KEY
  clickhouse:
    replicaCount: 1
    resourcesPreset: medium
    auth:
      password: ""  # set CLICKHOUSE_PASSWORD
  postgresql:
    auth:
      password: ""  # set POSTGRES_PASSWORD
  redis:
    auth:
      password: ""  # set REDIS_PASSWORD
